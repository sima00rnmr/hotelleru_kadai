<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>
	<title>パスワード再設定</title>
</head>

<body>

	<div class="moattravel-wrapper">

		<!-- ヘッダー -->
		<div th:replace="~{fragment :: header}"></div>

		<main class="container mt-4">

			<h2>パスワード再設定</h2>

			<!-- エラーメッセージ -->
			<div th:if="${errorMessage}">
				<p class="text-danger" th:text="${errorMessage}"></p>
			</div>

			<form th:action="@{/reset-password}" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
				<!-- トークン -->
				<input type="hidden" name="token" th:value="${token}">

				<div class="mb-3">
					<label class="form-label">新しいパスワード</label>
					<input type="password" name="password" class="form-control" required>
				</div>

				<div class="mb-3">
					<label class="form-label">確認用パスワード</label>
					<input type="password" name="confirmPassword" class="form-control" required>
				</div>

				<button class="btn btn-primary" type="submit">パスワード更新</button>

			</form>

			<!-- 追加：ログインへ戻る -->
			<div class="text-center mt-3">
				<a th:href="@{/login}">ログイン画面へ戻る</a>
			</div>

		</main>

		<!-- フッター -->
		<div th:replace="~{fragment :: footer}"></div>

	</div>

	<!-- script -->
	<div th:replace="~{fragment :: scripts}"></div>

</body>

</html>
